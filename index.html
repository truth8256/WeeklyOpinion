<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Opinion: 부동산 정책 여론</title>

    <!-- ── 폰트 ── -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">

    <!-- ── CSS ── -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/themes/light-gray.css">
    <link rel="stylesheet" href="css/typography.css">
    <link rel="stylesheet" href="css/layout-16x9.css">
    <link rel="stylesheet" href="css/animations.css">

    <!-- ── ECharts 5.6.0 ── -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.6.0/dist/echarts.min.js"></script>

    <style>
        /* OBS 투명 배경 대응: 기본은 검정, OBS에서 커스텀 CSS로 투명 처리 */
        body {
            background: #000;
        }
    </style>
</head>

<body>

    <!-- ── 슬라이드 뷰포트 ── -->
    <div class="slide-viewport">
        <div id="slide-container" class="slide-container">
            <!-- 슬라이드는 JS가 렌더링 -->
        </div>
    </div>

    <!-- ── 오버레이: 블랙아웃 ── -->
    <div id="slide-blackout" class="slide-blackout"></div>

    <!-- ── 오버레이: 동결 표시 ── -->
    <div id="slide-freeze-indicator" class="slide-freeze-indicator">■ FREEZE</div>

    <!-- ── HUD: 슬라이드 번호 ── -->
    <div id="slide-hud" class="slide-hud"></div>

    <!-- ── 유틸리티 ── -->
    <script src="js/utils/format.js"></script>
    <script src="js/utils/color-map.js"></script>
    <script src="js/utils/csv-loader.js"></script>

    <!-- ── 애니메이션 ── -->
    <script src="js/animations/animation-utils.js"></script>

    <!-- ── 차트 ── -->
    <script src="js/charts/chart-utils.js"></script>
    <script src="js/charts/bar-chart.js"></script>
    <script src="js/charts/donut-chart.js"></script>
    <script src="js/charts/line-chart.js"></script>
    <script src="js/charts/stack-chart.js"></script>

    <!-- ── 코어 ── -->
    <script src="js/core/keyboard-nav.js?v=2"></script>
    <script src="js/core/slide-engine.js?v=2"></script>

    <!-- ── 데이터 ── -->
    <script src="data/data.js?v=2"></script>

    <!-- ── 시작 ── -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            SlideEngine.init(PRESENTATION_CONFIG);
        });
    </script>

</body>

</html>
